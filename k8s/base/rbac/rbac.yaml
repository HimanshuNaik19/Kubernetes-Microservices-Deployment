apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-manager-sa
  namespace: dev
  labels:
    app: task-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-manager-role
  namespace: dev
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-manager-rolebinding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: task-manager-sa
  namespace: dev
roleRef:
  kind: Role
  name: task-manager-role
  apiGroup: rbac.authorization.k8s.io
